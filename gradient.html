<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .linear-gradient {
            width: 60rem;
            height: 10rem;
            margin: 3rem auto;
            border: 1px orangered solid;
            /* background: linear-gradient(135deg, #FF3256, #00D9FF, #FF3256); */
            background: linear-gradient(to right, #000000, #FF3256);
        }

        .radial-gradient {
            width: 30rem;
            height: 30rem;
            margin: 3rem auto;
            border: 1px orangered solid;
            background: radial-gradient(circle at top right, red, blue);
        }

        .gradient-text {
            text-align: center;
            font-size: 4rem;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            background: linear-gradient(to bottom, #000000, #00000046);
            background-clip: text;
            color: transparent;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            width: 30rem;
            height: 30rem;
            margin: 3rem auto;
            background: linear-gradient(135deg, blue, red, green);
        }
    </style>
</head>

<body>
    <div class="linear-gradient"></div>
    <h1 class="gradient-text">Hello World. Welcome to this training</h1>
    <div class="radial-gradient"></div>
    <div class="card"></div>
</body>

</html>
